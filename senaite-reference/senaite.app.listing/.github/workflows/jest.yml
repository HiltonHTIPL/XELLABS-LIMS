name: Jest

on:
  push:
    paths:
      - "webpack/**"
  pull_request:
    paths:
      - "webpack/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: webpack/yarn.lock

      - name: Install dependencies
        working-directory: webpack
        run: yarn install --frozen-lockfile

      - name: Run Jest tests
        working-directory: webpack
        run: yarn test
