# Production Docker Compose — XelLabs LIMS
# Usage: docker compose -f docker-compose.yml -f docs/deployment/docker-compose.prod.yml up -d --build

services:
  django:
    restart: always
    environment:
      DEBUG: "False"
      ALLOWED_HOSTS: "${DOMAIN}"
      SECURE_SSL_REDIRECT: "True"
      SESSION_COOKIE_SECURE: "True"
      CSRF_COOKIE_SECURE: "True"
    command: >
      sh -c "python manage.py migrate --no-input &&
             python manage.py collectstatic --no-input &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8001 --workers 4 --timeout 120"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery:
    restart: always
    command: celery -A config worker --loglevel=warning --concurrency=4

  celery-beat:
    restart: always
    command: celery -A config beat --loglevel=warning

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docs/deployment/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./xellabs-backend/staticfiles:/static:ro
      - ./xellabs-backend/media:/media:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - django

volumes:
  nginx_certs:
