# nginx reverse proxy for XelLabs LIMS — Production
# Place TLS cert at /etc/nginx/certs/xellabs.crt and key at /etc/nginx/certs/xellabs.key

upstream django {
    server django:8001;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/certs/xellabs.crt;
    ssl_certificate_key /etc/nginx/certs/xellabs.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()";

    client_max_body_size 50M;

    # Django API
    location /api/ {
        proxy_pass         http://django;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Django admin
    location /admin/ {
        proxy_pass         http://django;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Static files
    location /static/ {
        alias /static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (uploads, PDFs)
    location /media/ {
        alias /media/;
        expires 7d;
        # Restrict direct media access — serve via API in production
        internal;
    }

    # SENAITE
    location /senaite/ {
        proxy_pass http://senaite:8080/senaite/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # Health probe — allow from load balancer without auth
    location /api/health/ {
        proxy_pass http://django;
        access_log off;
    }

    # Block sensitive paths
    location ~ /\. {
        deny all;
    }
}
