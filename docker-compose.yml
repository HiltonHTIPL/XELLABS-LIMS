services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: xellabs_lims
      POSTGRES_USER: xellabs_user
      POSTGRES_PASSWORD: "3333"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xellabs_user -d xellabs_lims"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  django:
    build:
      context: ./xellabs-backend
    restart: unless-stopped
    env_file:
      - path: ./xellabs-backend/.env
        required: false
    environment:
      DEBUG: "True"
      SECRET_KEY: "dev-secret-key-change-in-production"
      DB_NAME: xellabs_lims
      DB_USER: xellabs_user
      DB_PASSWORD: "3333"
      DB_HOST: postgres
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SENAITE_URL: http://senaite:8080/senaite
      SENAITE_USER: admin
      SENAITE_PASSWORD: admin
    ports:
      - "8001:8001"
    volumes:
      - ./xellabs-backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate_schemas --shared --noinput &&
             python manage.py runserver 0.0.0.0:8001"

  celery:
    build:
      context: ./xellabs-backend
    restart: unless-stopped
    env_file:
      - path: ./xellabs-backend/.env
        required: false
    environment:
      DEBUG: "True"
      SECRET_KEY: "dev-secret-key-change-in-production"
      DB_NAME: xellabs_lims
      DB_USER: xellabs_user
      DB_PASSWORD: "3333"
      DB_HOST: postgres
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./xellabs-backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      watchmedo auto-restart
        --directory=/app
        --pattern=*.py
        --recursive
        --
        celery -A config worker --loglevel=info --pool=solo

  celery-beat:
    build:
      context: ./xellabs-backend
    restart: unless-stopped
    env_file:
      - path: ./xellabs-backend/.env
        required: false
    environment:
      DEBUG: "True"
      SECRET_KEY: "dev-secret-key-change-in-production"
      DB_NAME: xellabs_lims
      DB_USER: xellabs_user
      DB_PASSWORD: "3333"
      DB_HOST: postgres
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./xellabs-backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config beat --loglevel=info

  senaite:
    build:
      context: ./senaite-rebrand
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SITE=senaite
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=admin
    volumes:
      - senaite_data:/data

  frontend:
    build:
      context: ./xellabs-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DJANGO_API_URL=http://django:8001
      - SENAITE_URL=http://senaite:8080/senaite
      - SESSION_SECRET=xellabs-lims-hipaa-jwt-secret-change-in-production-min32chars
      - NODE_ENV=development
    volumes:
      - ./xellabs-frontend:/app              # live-mount source; next dev HMR reloads on .tsx/.ts changes
      - /app/node_modules           # preserve packages installed during image build
      - /app/.next                  # isolate turbopack cache in container (prevents host-path corruption)
    depends_on:
      - django

volumes:
  postgres_data:
  senaite_data:
